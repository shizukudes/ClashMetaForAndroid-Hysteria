name: Build Release (2 ABI)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (example: v2.11.24-hys1)'
        required: true
      release_name:
        description: 'Release title (optional)'
        required: false

permissions:
  contents: write

jobs:
  build-release-2abi:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          check-latest: true

      - name: Apply patches
        run: |
          cd "$(go env GOROOT)"
          for p in "$GITHUB_WORKSPACE"/.github/patch/*.patch; do
            patch --verbose -p 1 < "$p"
          done

      - name: Generate keystore
        run: |
          rm -f release.keystore
          keytool -genkey -v \
            -keystore release.keystore \
            -alias key0 \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass 123456 \
            -keypass 123456 \
            -dname "CN=ClashMeta, OU=Clash, O=Clash, L=ID, S=ID, C=ID"

      - name: Update CA bundle for core
        run: |
          sudo apt-get update && sudo apt-get install -y ca-certificates
          sudo update-ca-certificates
          cp -f /etc/ssl/certs/ca-certificates.crt core/src/foss/golang/clash/component/ca/ca-certificates.crt

      - name: Build meta release APKs
        run: ./gradlew --no-daemon app:assembleMetaRelease

      - name: Publish GitHub release (arm64-v8a + armeabi-v7a only)
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_name != '' && inputs.release_name || inputs.release_tag }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/meta/release/*-arm64-v8a-*.apk
            app/build/outputs/apk/meta/release/*-armeabi-v7a-*.apk
